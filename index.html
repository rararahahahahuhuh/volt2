<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLTAGE DASH - PERFECT LAYOUT (YELLOW THUNDER & RED UI)</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-color: #ff3300;       /* UI: 赤系 */
            --ui-accent: #ff6600;      /* UIアクセント: 明るい赤系 */
            --thunder-color: #ffcc00;  /* 雷の色: 黄色 (変更) */
            --bg-color: #000000;       /* 背景: 完全な黒 */
        }
        
        body { 
            margin: 0; overflow: hidden; background-color: var(--bg-color); 
            font-family: 'Share Tech Mono', monospace; 
            touch-action: none; user-select: none; -webkit-user-select: none; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: var(--ui-color);
        }

        /* 走査線エフェクト */
        body::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: repeating-linear-gradient(90deg, rgba(0,0,0,0.5) 0px, rgba(0,0,0,0.5) 1px, transparent 1px, transparent 3px);
            background-size: 3px 100%; pointer-events: none; z-index: 100;
        }

        #device-frame {
            position: relative; width: 100%; max-width: 480px; height: 95vh;
            display: flex; flex-direction: column;
            border: 2px solid #840; box-shadow: 0 0 25px rgba(255, 51, 0, 0.3); /* 色変更 */
            background: #000; padding: 5px; box-sizing: border-box; overflow: hidden;
        }

        #ui-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 2px solid #840; padding-bottom: 5px; margin-bottom: 5px;
            height: 30px; font-size: 10px; z-index: 20; position: relative; flex-shrink: 0;
        }
        .ui-text span { color: var(--ui-color); opacity: 0.7; }

        #viewport {
            position: relative; flex-grow: 1; border: 1px solid #310;
            background: #000000; overflow: hidden;
            display: flex; flex-direction: column; /* 内部要素配置用 */
        }
        
        /* キャンバスは背景として配置 */
        canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            display: block; z-index: 1;
        }

        #hud-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .hud-val { position: absolute; font-size: 16px; text-shadow: 0 0 5px #a00; } /* 色変更 */
        #score-disp { top: 10px; right: 10px; text-align: right; }
        #level-disp { top: 10px; left: 10px; }
        
        /* 中央メッセージ (SIGNAL LOSTなど) */
        #center-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; width: 100%; text-shadow: 0 0 10px var(--ui-color); z-index: 60;
        }
        h1 { margin: 0; color: var(--ui-accent); letter-spacing: 3px; }
        
        #gauge-container { position: absolute; bottom: 10px; left: 10px; width: 120px; z-index: 50; }
        #gauge-bar { height: 6px; border: 1px solid #500; margin-top: 2px; background: #100; } /* 色変更 */
        #gauge-fill { height: 100%; width: 0%; background: var(--ui-color); box-shadow: 0 0 5px var(--ui-color); }

        #ui-footer { height: 40px; display: flex; gap: 4px; margin-top: 5px; z-index: 20; position: relative; flex-shrink: 0;}
        .btn { flex: 1; border: 1px solid #500; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 9px; color: #600; background: rgba(50, 0, 0, 0.2); } /* 色変更 */
        .btn.active { border-color: var(--ui-color); color: var(--ui-color); }

        .hidden { display: none !important; }
        .blink { animation: blink 0.5s step-end infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
        
        /* ★修正: タイトル画面の均等配置レイアウト */
        #start-screen-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            justify-content: space-evenly; /* 均等配置で重なり防止 */
            align-items: center;     
            z-index: 70; pointer-events: none;
            background: rgba(0,0,0,0.4); /* 背景を少し暗くして文字を見やすく */
            padding: 20px 0;
            box-sizing: border-box;
            gap: 10px; /* 要素間の隙間 */
        }

        /* 1. 自作画像ロゴ: 大きく配置 (変更) */
        #custom-logo {
            width: 250px; /* 大きく表示 (変更) */
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.8)); /* 黄色い光 (色変更) */
            background-color: transparent; /* 背景を確実に透過 */
            flex-shrink: 0;
        }

        /* 2. タイトル文字: 小さく (変更) */
        #title-text-group { text-align: center; }
        
        #start-title { 
            font-size: 20px; /* 小さく (変更) */
            color: var(--ui-accent); 
            text-shadow: 0 0 15px var(--ui-accent); 
            letter-spacing: 6px; 
            margin: 0; 
            text-align: center; 
            width: 100%;
            line-height: 1.1;
        }
        
        /* 3. TAP TO START */
        #start-prompt { 
            font-size: 16px; 
            color: var(--ui-color); 
            margin: 0; 
            text-align: center;
            width: 100%;
        }

        /* 4. ランキング表: 下に配置 */
        #ranking-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border: 1px solid #530;
            width: 80%;
        }
        .rank-header { 
            color: #ff3300; 
            font-size: 14px; 
            margin-bottom: 5px; 
            letter-spacing: 2px; 
            border-bottom: 1px solid #530; 
            display: inline-block;
            padding-bottom: 2px;
        }
        .rank-row { font-size: 16px; margin: 4px 0; display: flex; justify-content: space-between; }
        .rank-1 { color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px #ffcc00; } /* 1位は黄色 */
        .rank-other { color: #ff9999; } /* 2位以降は薄い赤 */

    </style>
</head>
<body>

<div id="device-frame">
    <div id="ui-header">
        <div class="ui-text" id="header-status">MODE: STANDBY<br><span>INPUT: SENSOR_A</span></div>
        <div class="ui-text" style="text-align:right;">GAIN: MAX<br><span>60Hz</span></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud-layer" class="hidden">
            <div id="level-disp" class="hud-val">LVL: 01</div>
            <div id="score-disp" class="hud-val">VOLT<br><span id="val-score" style="color:var(--ui-color); font-size:20px;">0</span></div>
            <div id="gauge-container"><div id="gauge-bar"><div id="gauge-fill"></div></div></div>
            
            <div id="center-msg" class="hidden">
                <h1 id="msg-title" style="font-size:28px;">SIGNAL<br>LOST</h1>
                <p id="msg-sub" class="blink" style="font-size:12px; margin-top:10px; color:var(--ui-color);">[ ANALYZING DATA... ]</p>
            </div>
        </div>

        <div id="start-screen-layer">
            <img id="custom-logo" src="logo.png" alt="CUSTOM LOGO">
            
            <div id="title-text-group">
                <h1 id="start-title">VOLTAGE DASH</h1>
            </div>

            <p id="start-prompt" class="blink">[ TAP TO START ]</p>

            <div id="ranking-container">
                <div class="rank-header">- TOP RECORDS -</div>
                <div id="ranking-list"></div>
            </div>
        </div>
    </div>

    <div id="ui-footer">
        <div class="btn active">POWER<br>ON</div>
        <div class="btn">SOURCE<br>INT</div>
        <div class="btn">X-POS<br>AUTO</div>
        <div class="btn">Y-POS<br>CTR</div>
    </div>
</div>

<script>
    // --- Audio System (音を消すためメソッドを空にする) ---
    const Sound={ctx:null,init:function(){},play:function(){},noise:function(){},turn:function(){},coin:function(){},powerUp:function(){},levelUp:function(){},overload:function(){},charge:function(){},beam:function(){},crash:function(){},startBGM:function(){},stopBGM:function(){}};

    // --- References ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const parent = document.getElementById('viewport');
    
    const elScore = document.getElementById('val-score');
    const elLevel = document.getElementById('level-disp');
    const elGauge = document.getElementById('gauge-fill');
    const elMsg = document.getElementById('center-msg');
    const elMsgTitle = document.getElementById('msg-title');
    const elMsgSub = document.getElementById('msg-sub');
    const frameEl = document.getElementById('device-frame');
    const hudLayer = document.getElementById('hud-layer');
    const startScreenLayer = document.getElementById('start-screen-layer');
    const headerStatus = document.getElementById('header-status');
    const rankingListEl = document.getElementById('ranking-list');

    let W, H;
    const resize = () => { W = canvas.width = parent.clientWidth; H = canvas.height = parent.clientHeight; initBgParticles(); };
    window.addEventListener('resize', resize);

    // --- State ---
    let gameState = 'START';
    let score = 0; let displayScore = 0;
    let level = 1; let nextLevelScore = 1500; const SCORE_PER_LEVEL = 1500; 
    let baseSpeed = 5.0; let spawnRate = 30; let frameCount = 0;
    let overloadPoints = 0; const OVERLOAD_MAX = 5; let isOverload = false; let overloadTimer = 0; 

    const player = { x: 0, y: 0, dx: 4.0, trail: [], dead: false };
    
    let obstacles = []; let items = []; let particles = []; let floatingTexts = [];
    let bgParticles = []; 
    let pathHistory = []; 
    let totalDistance = 0;

    let resultScrollY = 0;
    let maxScrollY = 0;
    let scrollSpeed = 5.0;
    let isNewRecord = false;

    let chromaticAberration = 0; let screenShake = 0; let flashIntensity = 0;
    let hitStop = 0; 
    let isTouching = false; 
    let chargeFrames = 0; 
    const CHARGE_THRESHOLD = 45; 
    const CHARGE_DELAY = 10; 
    let beamActive = 0; 
    let originalSpeed = 0; 

    // --- Ranking System ---
    let rankingData = [];
    const RANKING_KEY = 'voltage_dash_ranking';

    function loadRanking() {
        const stored = localStorage.getItem(RANKING_KEY);
        if (stored) { rankingData = JSON.parse(stored); } 
        else { rankingData = [5000, 4000, 3000, 2000, 1000]; }
        updateRankingHTML();
    }
    
    function saveRanking(newScore) {
        rankingData.push(newScore);
        rankingData.sort((a, b) => b - a);
        if (rankingData.length > 5) rankingData = rankingData.slice(0, 5);
        localStorage.setItem(RANKING_KEY, JSON.stringify(rankingData));
        updateRankingHTML();
        return (newScore > 0 && newScore === rankingData[0]);
    }

    function updateRankingHTML() {
        rankingListEl.innerHTML = '';
        rankingData.forEach((val, idx) => {
            let row = document.createElement('div');
            row.className = 'rank-row ' + (idx === 0 ? 'rank-1' : 'rank-other');
            let rankStr = (idx+1) + (idx===0?"ST": idx===1?"ND": idx===2?"RD":"TH");
            row.innerHTML = `<span>${rankStr}</span><span>${val}</span>`;
            rankingListEl.appendChild(row);
        });
    }
    loadRanking();

    // --- Game Logic ---
    function initBgParticles() {
        bgParticles = [];
        const count = Math.floor((W * H) / 250); 
        for(let i=0; i<count; i++) {
            bgParticles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                size: Math.random() < 0.6 ? 1.5 : 2.5,
                // 色を赤系に (変更)
                color: `rgba(${150 + Math.random()*105}, 0, 0, ${0.5 + Math.random()*0.4})`,
                speedMod: 0.5 + Math.random() * 1.5
            });
        }
    }

    function handleStart(e) {
        if(e.type !== 'keydown') e.preventDefault();
        Sound.init();

        if (gameState === 'START') { startGame(); Sound.powerUp(); return; }
        if (gameState === 'GAMEOVER_ANIM') { toResultScreen(); return; }
        if (gameState === 'RESULT') { toTitleScreen(); Sound.turn(); return; }
        if (gameState === 'PLAYING') { isTouching = true; chargeFrames = 0; }
    }

    function handleEnd(e) {
        if(e.type !== 'keyup') e.preventDefault();
        if(gameState !== 'PLAYING') return;
        isTouching = false;
        if(chargeFrames < CHARGE_THRESHOLD) {
            player.dx *= -1; 
            screenShake = isOverload ? 8 : 4; 
            Sound.turn(); 
            spawnPixelParticles(player.x, player.y, 8, ['#fff', '#ffcc00'], 20); // 飛沫を黄色に
        } else {
            fireDischarge();
        }
        chargeFrames = 0;
    }

    frameEl.addEventListener('mousedown', handleStart);
    frameEl.addEventListener('mouseup', handleEnd);
    frameEl.addEventListener('touchstart', handleStart, {passive: false});
    frameEl.addEventListener('touchend', handleEnd, {passive: false});
    window.addEventListener('keydown', (e) => { if(e.code==='Space') handleStart(e); });
    window.addEventListener('keyup', (e) => { if(e.code==='Space') handleEnd(e); });

    function fireDischarge() {
        Sound.beam(); addFloatingText("DISCHARGE", player.x, player.y - 50, '#ffcc00'); // テキストを黄色に
        screenShake = 15; flashIntensity = 0.8; hitStop = 4; 
        if (beamActive <= 0) { originalSpeed = baseSpeed; baseSpeed += 15.0; }
        beamActive = 45; 
    }

    function toTitleScreen() {
        gameState = 'START';
        startScreenLayer.classList.remove('hidden');
        hudLayer.classList.add('hidden');
        elMsg.classList.add('hidden');
        headerStatus.innerHTML = 'MODE: STANDBY<br><span>INPUT: SENSOR_A</span>';
    }

    function startGame() {
        gameState = 'PLAYING';
        score = 0; displayScore = 0; level = 1; nextLevelScore = SCORE_PER_LEVEL; overloadPoints = 0; isOverload = false;
        baseSpeed = 5.0; spawnRate = 30; player.dx = 4.0;
        hitStop = 0; isTouching = false; chargeFrames = 0; beamActive = 0;
        
        elLevel.innerText = "LVL: 01"; 
        elMsg.classList.add('hidden');
        hudLayer.classList.remove('hidden');
        startScreenLayer.classList.add('hidden');
        headerStatus.innerHTML = 'MODE: OPERATING<br><span>INPUT: SENSOR_A</span>';

        player.x = W / 2; player.y = H * 0.4;
        if(Math.random()<0.5) player.dx *= -1; player.trail = []; player.dead = false;
        obstacles = []; items = []; particles = []; floatingTexts = [];
        pathHistory = []; 
        totalDistance = 0;
        frameCount = 0; screenShake = 0; flashIntensity = 0;
        isNewRecord = false;
        
        initBgParticles(); Sound.startBGM(false);
    }

    function gameOver() {
        gameState = 'GAMEOVER_ANIM';
        Sound.crash(); Sound.stopBGM();
        screenShake = 20; flashIntensity = 0.8;
        
        elMsgTitle.innerHTML = "SIGNAL<br>LOST"; 
        elMsgSub.innerHTML = `ANALYZING TRAJECTORY...<br>[ TAP TO SKIP ]`;
        elMsg.classList.remove('hidden');
        headerStatus.innerHTML = 'MODE: SIGNAL LOST<br><span>DATA PROCESSING...</span>';

        setTimeout(() => { if(gameState === 'GAMEOVER_ANIM') toResultScreen(); }, 2500);
    }

    function toResultScreen() {
        gameState = 'RESULT';
        screenShake = 0; flashIntensity = 0;
        elMsg.classList.add('hidden'); 
        hudLayer.classList.add('hidden'); 
        headerStatus.innerHTML = 'MODE: RESULT LOG<br><span>TRAJECTORY PLOTTED</span>';
        Sound.powerUp(); 
        
        isNewRecord = saveRanking(score);

        // ★修正: 0.3倍の等倍スケーリング（1:1維持）
        let displayScale = 0.3; 
        let stepY = baseSpeed * displayScale; // 縦方向も0.3倍
        
        maxScrollY = totalDistance * displayScale; // 距離も0.3倍
        resultScrollY = 0;
        scrollSpeed = baseSpeed * displayScale; // 速度も0.3倍で同期
    }

    function checkLevelUp() {
        if (score >= nextLevelScore) {
            level++; nextLevelScore += SCORE_PER_LEVEL + (level * 500);
            let newBaseSpeed = Math.min(12.0, 5.0 + (level - 1) * 0.5);
            if (beamActive > 0) originalSpeed = newBaseSpeed; else baseSpeed = newBaseSpeed;
            spawnRate = Math.max(10, 30 - (level * 2));
            let absDx = Math.min(8.0, 4.0 + (level - 1) * 0.3); player.dx = (player.dx > 0 ? 1 : -1) * absDx;
            // 黄色を赤へ (変更)
            addFloatingText("LEVEL UP", W/2, H/2, '#ff3300'); Sound.levelUp(); flashIntensity = 0.6; 
            elLevel.innerText = "LVL: " + (level<10?"0"+level:level);
        }
    }

    function createItem(x, y) {
        let type = Math.random() < 0.05 ? 'BLUE' : 'YELLOW';
        items.push({ x: x, y: y, type: type });
    }

    function createObstacle(x, y) {
        let spawnItem = Math.random() < 0.3;
        let sizeType = Math.random();
        let mainParticleCount = 0; let mainRadius = 0; let mainSpread = 0;
        if (sizeType < 0.1) { mainParticleCount = 400; mainRadius = 80; mainSpread = 50; x = Math.random() < 0.5 ? -40 : W + 40; }
        else if (sizeType < 0.5) { mainParticleCount = 200; mainRadius = 50; mainSpread = 30; let margin = 40; x = Math.max(margin, Math.min(W - margin, x + (Math.random()-0.5)*W*0.6)); }
        else { mainParticleCount = 100; mainRadius = 35; mainSpread = 20; let margin = 30; x = Math.max(margin, Math.min(W - margin, x + (Math.random()-0.5)*W*0.6)); }

        let cloudParticles = [];
        function generateCloudChunk(offsetX, offsetY, count, radius, spread) {
            let numCores = 2 + Math.floor(Math.random() * 3);
            let cores = [];
            for(let i=0; i<numCores; i++) cores.push({ dx: (Math.random() - 0.5)*spread*1.5, dy: (Math.random()-0.5)*spread, radius: radius*(0.4+Math.random()*0.3) });
            for(let i=0; i<count; i++) {
                let core = cores[Math.floor(Math.random() * numCores)];
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.sqrt(Math.random()) * core.radius;
                cloudParticles.push({ ox: offsetX + core.dx + Math.cos(angle)*distance, oy: offsetY + core.dy + Math.sin(angle)*distance, size: Math.random()<0.7?2:4, alpha: 0.4+Math.random()*0.6 });
            }
        }
        generateCloudChunk(0, 0, mainParticleCount, mainRadius, mainSpread);
        let numSubClouds = 1 + Math.floor(Math.random() * 3);
        for(let i=0; i<numSubClouds; i++) {
            let subOffsetX = (Math.random() - 0.5) * mainRadius * 1.2;
            let subOffsetY = (Math.random() - 0.5) * mainRadius * 0.8;
            generateCloudChunk(subOffsetX, subOffsetY, mainParticleCount * 0.6, mainRadius * 0.7, mainSpread * 0.8);
        }
        let totalRadius = mainRadius * 1.4;
        obstacles.push({ x: x, y: y, r: totalRadius, cloudParticles: cloudParticles, passes: false }); // passes変更なし
        
        if (spawnItem) { 
            let safe = false; let retry = 0; let itemX, itemY;
            while(!safe && retry < 5) {
                let angle = Math.PI * (1.2 + Math.random() * 0.6); 
                let dist = totalRadius + 50 + Math.random() * 30; 
                itemX = x + Math.cos(angle) * dist;
                itemY = y + Math.sin(angle) * dist;
                if (itemX > 30 && itemX < W - 30) safe = true;
                retry++;
            }
            if(safe) createItem(itemX, itemY); 
        }
    }

    function spawnPixelParticles(x, y, count, colors, lifeBase) {
        for(let i=0; i<count; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, life: lifeBase + Math.random()*15, maxLife: lifeBase + 15, color: colors[0] }); }
    }
    
    function addFloatingText(text, x, y, color) { floatingTexts.push({ text: text, x: x, y: y, color: color, life: 40 }); }

    function activateOverload() {
        if(isOverload) return; isOverload = true; overloadTimer = 300; flashIntensity = 0.5; screenShake = 20; 
        Sound.overload(); Sound.startBGM(true);
        // 黄色を赤へ (変更)
        addFloatingText("OVERLOAD!", W/2, H/3, '#ff3300');
    }

    function update() {
        bgParticles.forEach(p => {
            p.y -= baseSpeed * p.speedMod; 
            if(p.y < 0) { p.y = H + Math.random() * 20; p.x = Math.random() * W; }
        });

        if (gameState !== 'PLAYING') return;

        if (hitStop > 0) { hitStop--; return; }

        if (isTouching && beamActive <= 0) {
            chargeFrames++;
            if(chargeFrames === CHARGE_THRESHOLD) { Sound.charge(); }
        } else if (beamActive > 0) { chargeFrames = 0; }

        let speedFactor = (isTouching && chargeFrames > CHARGE_DELAY && beamActive <= 0) ? 0.3 : 1.0;
        player.x += player.dx * speedFactor;

        if(player.x <= 10) { player.x = 10; player.dx *= -1; screenShake = 4; Sound.turn(); }
        if(player.x >= W - 10) { player.x = W - 10; player.dx *= -1; screenShake = 4; Sound.turn(); }
        
        pathHistory.push({ x: player.x, dist: totalDistance });
        totalDistance += baseSpeed;

        if(isOverload) { overloadTimer--; screenShake = Math.max(screenShake, 4); if(overloadTimer <= 0) { isOverload = false; overloadPoints = 0; Sound.startBGM(false); } }
        
        for(let t of player.trail) { t.y -= baseSpeed; t.life--; }
        player.trail.push({x: player.x, y: player.y, life: 150}); 
        player.trail = player.trail.filter(t => t.life > 0);

        let currentSpawnRate = isOverload ? 10 : spawnRate; 
        if(frameCount % Math.floor(currentSpawnRate) === 0) createObstacle(Math.random() * (W - 60) + 30, H + 50);

        for(let i=obstacles.length-1; i>=0; i--) {
            let obs = obstacles[i]; obs.y -= baseSpeed;
            let dist = Math.hypot(player.x - obs.x, player.y - obs.y);
            
            if(dist < obs.r * 0.7) { 
                if (beamActive > 0 || isOverload) {
                    Sound.overload(); score += 500; screenShake = 12; hitStop = 4; 
                    addFloatingText("CLOUD BRK", obs.x, obs.y, '#ffcc00'); obstacles.splice(i, 1); // テキストを黄色に
                } else { gameOver(); return; }
                continue;
            }
            // ★ニアミス判定とテキスト表示を削除
            /*
            if (!isOverload && !obs.passes && dist < obs.r + 30) {
                obs.passes = true; score += 100; addFloatingText("NEAR", player.x, player.y - 30, '#ffcc00'); // 黄色に変更
            }
            */
            if(obs.y < -300) obstacles.splice(i, 1);
        }

        for(let i=items.length-1; i>=0; i--) {
            let item = items[i]; item.y -= baseSpeed;
            if(Math.hypot(player.x - item.x, player.y - item.y) < 40) { 
                if(item.type === 'YELLOW') {
                    // 黄色を赤へ (変更)
                    score += 500; addFloatingText("+500", item.x, item.y, '#ffcc00'); Sound.coin(); // テキストを黄色に
                    if(!isOverload) { overloadPoints++; if(overloadPoints >= OVERLOAD_MAX) activateOverload(); }
                } else {
                    score += 1000; addFloatingText("MAX", item.x, item.y, '#ffcc00'); Sound.powerUp(); activateOverload(); // テキストを黄色に
                }
                items.splice(i, 1); hitStop = 2; continue;
            }
            if(item.y < -50) items.splice(i, 1);
        }
        
        checkLevelUp();
        let gaugePct = (overloadPoints / OVERLOAD_MAX) * 100; if(isOverload) gaugePct = (overloadTimer / 300) * 100;
        elGauge.style.width = gaugePct + "%";
        if(screenShake > 0) screenShake *= 0.8;
        if(flashIntensity > 0) flashIntensity *= 0.8;
        if(displayScore < score) displayScore += Math.ceil((score - displayScore) * 0.2);
        elScore.innerText = displayScore;
        frameCount++;
        if(beamActive > 0) { beamActive--; if(beamActive === 0) baseSpeed = originalSpeed; }

        for(let i=floatingTexts.length-1; i>=0; i--) {
            let ft = floatingTexts[i];
            ft.y -= 1.5; ft.life--; if(ft.life <= 0) floatingTexts.splice(i, 1);
        }

        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life--; if(p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawThunderShape(ctx, x, y, scale, color, blur) {
        ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
        ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = blur;
        ctx.beginPath();
        ctx.moveTo(3, -10); ctx.lineTo(-6, -2); ctx.lineTo(-2, -2);
        ctx.lineTo(-5, 10); ctx.lineTo(6, 2); ctx.lineTo(2, 2);
        ctx.closePath(); ctx.fill(); ctx.restore();
    }

    function drawResultScreen() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.95)'; ctx.fillRect(0, 0, W, H);

        let graphW = W; 
        let graphH = H - 200; 
        let graphY = 120;

        ctx.textAlign = 'center'; 
        
        if (isNewRecord) {
            // NEW RECORDの場合は派手に
            if (Math.floor(Date.now() / 200) % 2 === 0) {
                ctx.fillStyle = '#ff0000'; // そのまま
            } else {
                ctx.fillStyle = '#ffcc00'; // 黄色を赤へ (変更)
            }
            ctx.font = '32px "Share Tech Mono"'; 
            ctx.fillText(`NEW RECORD!`, W/2, 40);
            ctx.fillStyle = '#fff'; 
            ctx.fillText(`${score}`, W/2, 80);
        } else {
            ctx.fillStyle = '#fff'; 
            ctx.font = '24px "Share Tech Mono"'; 
            ctx.fillText(`SCORE: ${score}`, W/2, 50);
            let rank = "C"; if(score>3000)rank="B"; if(score>6000)rank="A"; if(score>10000)rank="S"; if(score>20000)rank="SS"; if(score>50000)rank="SSS";
            ctx.fillStyle = '#ffcc00'; ctx.font = '40px "Share Tech Mono"'; ctx.fillText(`RANK ${rank}`, W/2, 90); // 黄色を赤へ (変更)
        }

        ctx.save();
        ctx.strokeStyle = '#330000'; ctx.lineWidth = 1; // 色変更
        ctx.beginPath();
        for(let gx=0; gx<=graphW; gx+=50) { ctx.moveTo(gx, graphY); ctx.lineTo(gx, graphY+graphH); }
        for(let gy=0; gy<=graphH; gy+=50) { ctx.moveTo(0, graphY+gy); ctx.lineTo(graphW, graphY+gy); }
        ctx.stroke();

        ctx.beginPath(); ctx.rect(0, graphY, graphW, graphH); ctx.clip();

        // ★修正: 0.3倍の等倍スケーリング（1:1維持）
        let displayScale = 0.3; 
        let stepY = baseSpeed * displayScale; // 縦方向も0.3倍
        
        maxScrollY = totalDistance * displayScale; // 距離も0.3倍
        resultScrollY = 0;
        scrollSpeed = baseSpeed * displayScale; // 速度も0.3倍で同期

        if (pathHistory.length > 1) {
            ctx.beginPath();
            // ★チャージしてスピードが上がった時、雷を黄色のままで (変更)
            ctx.shadowColor = '#ffcc00'; 
            ctx.shadowBlur = 0; 
            ctx.strokeStyle = '#ffcc00'; 
            ctx.lineWidth = 3; 
            ctx.lineJoin = 'round';

            let lastX = 0, lastY = 0;
            
            for(let i = 0; i < pathHistory.length; i++) {
                let p = pathHistory[i];
                let rawX = p.x;
                // rawX は 0~W
                // 中心基準で0.3倍に縮小
                let distFromCenter = rawX - (W / 2);
                let px = (W / 2) + (distFromCenter * displayScale);

                // Y座標
                let drawY = graphY + (p.dist * displayScale) - resultScrollY;

                if (i === 0) ctx.moveTo(px, drawY); else ctx.lineTo(px, drawY);
                if (i === pathHistory.length - 1) { lastX = px; lastY = drawY; }
            }
            ctx.stroke();
            
            ctx.shadowBlur = 0; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();

            let p0 = pathHistory[0];
            let startX = (W / 2) + (p0.x - W/2) * displayScale;
            let startY = graphY + (p0.dist * displayScale) - resultScrollY;
            if (startY > graphY && startY < graphY + graphH) {
                ctx.fillStyle = '#0f0'; ctx.font = '10px "Share Tech Mono"'; ctx.fillText("START", startX, startY - 10);
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(startX, startY, 4, 0, Math.PI*2); ctx.fill();
            }

            if (lastY > graphY && lastY < graphY + graphH) {
                ctx.fillStyle = '#fff'; ctx.font = '10px "Share Tech Mono"'; ctx.fillText("FINISH", lastX, lastY + 15);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(lastX, lastY, 4, 0, Math.PI*2); ctx.fill();
            }
        }
        ctx.restore();

        ctx.fillStyle = '#ff3300'; ctx.font = '12px "Share Tech Mono"'; // 黄色を赤へ (変更)
        ctx.fillText("TAP TO RETURN TITLE", W/2, graphY + graphH + 30);
    }

    function draw() {
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, W, H);
        
        let sx = (Math.random() - 0.5) * screenShake; let sy = (Math.random() - 0.5) * screenShake;
        if (gameState === 'RESULT') { sx = 0; sy = 0; }
        ctx.save(); ctx.translate(sx, sy);

        bgParticles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });

        if (gameState === 'PLAYING' || gameState === 'GAMEOVER_ANIM') {
            obstacles.forEach(obs => {
                let color = '255, 50, 0'; // ★雲に近づいた時に青くなるのをやめましょう (赤に統一)
                obs.cloudParticles.forEach(cp => {
                    ctx.fillStyle = `rgba(${color}, ${cp.alpha})`; ctx.fillRect(obs.x + cp.ox, obs.y + cp.oy, cp.size, cp.size);
                });
            });

            ctx.globalCompositeOperation = 'screen'; 
            let basePower = isOverload ? 15 : 7; 
            let points = [];
            for(let i=0; i<player.trail.length; i++) { 
                let jitterX = (Math.random() - 0.5) * (basePower + Math.random() * 8);
                points.push({ x: player.trail[i].x + jitterX, y: player.trail[i].y }); 
            }
            points.push({x: player.x, y: player.y});

            if(points.length > 1) {
                let glowColor = (beamActive>0 || isOverload) ? '#00ffff' : '#ffcc00'; // ★通常時の雷を黄色(#ffcc00)に変更
                if(isOverload) glowColor = '#ff3300'; // 黄色を赤へ (変更)
                // ★チャージしてスピードが上がった時(isOverload=false, beamActive>0)，雷を黄色のままで (変更)
                if(beamActive > 0 && !isOverload) glowColor = '#ffcc00';

                if(isOverload) {
                     ctx.shadowBlur = 40; ctx.shadowColor = '#cc0000'; ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 10; // 黄色を赤へ (変更)
                     ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                     ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
                     for(let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y); ctx.stroke();
                }

                ctx.shadowBlur = isOverload ? 30 : 20; ctx.shadowColor = glowColor; ctx.strokeStyle = glowColor; 
                ctx.lineWidth = isOverload ? 6 : 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
                for(let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y); ctx.stroke();

                if(isOverload) {
                    ctx.shadowBlur = 15; ctx.lineWidth = 2; ctx.beginPath();
                    for(let i=0; i<points.length; i+=3) { 
                        if(Math.random() < 0.4) { 
                            let start = points[i]; let angle = Math.random() * Math.PI * 2; let len = 10 + Math.random() * 30;
                            ctx.moveTo(start.x, start.y); ctx.lineTo(start.x + Math.cos(angle) * len, start.y + Math.sin(angle) * len);
                        }
                    }
                    ctx.stroke();
                }

                ctx.shadowBlur = 0; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = isOverload ? 3 : 2; 
                ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
                for(let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y); ctx.stroke();

                let pSize = 10; if(chargeFrames > 20) pSize = 15;
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = glowColor;
                ctx.fillRect(player.x - pSize/2, player.y - pSize/2, pSize, pSize);
                
                if(isTouching && chargeFrames < CHARGE_THRESHOLD && chargeFrames > CHARGE_DELAY) {
                    let actualProgress = (chargeFrames - CHARGE_DELAY) / (CHARGE_THRESHOLD - CHARGE_DELAY);
                    let r = 50 * (1 - actualProgress);
                    ctx.strokeStyle = `rgba(0, 255, 128, ${0.5 + actualProgress*0.5})`; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(player.x, player.y, r, 0, Math.PI*2); ctx.stroke();
                }
            }

            ctx.globalCompositeOperation = 'source-over';
            items.forEach(item => {
                // 黄色を赤へ (変更)
                let col = item.type === 'YELLOW' ? '#ffcc00' : '#00ffff'; // アイテムを黄色に
                drawThunderShape(ctx, item.x, item.y, 1.5, col, 15);
            });

            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 2, 2); });
            
            ctx.font = '12px "Share Tech Mono"'; ctx.textAlign = 'center';
            floatingTexts.forEach(ft => { 
                let alpha = 1.0; if(ft.life < 15) alpha = ft.life / 15; 
                ctx.globalAlpha = alpha; ctx.fillStyle = ft.color; ctx.fillText(ft.text, ft.x, ft.y); 
            });
            ctx.globalAlpha = 1.0;
        }
        else if (gameState === 'RESULT') {
            drawResultScreen();
        }

        ctx.restore();
        if (flashIntensity > 0) { 
            ctx.fillStyle = `rgba(255, 255, 255, ${flashIntensity})`; 
            ctx.globalCompositeOperation = 'screen'; ctx.fillRect(0, 0, W, H); ctx.globalCompositeOperation = 'source-over';
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    resize(); ctx.fillStyle = '#000000'; ctx.fillRect(0,0,1000,1000);
    loop();
</script>
